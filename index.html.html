<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlaç Kartlığım</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EAEEEE;--card:#FFFFFF;--ink:#182528;--muted:#5E6E72;--faint:#8A989B;
  --line:#DBE2E2;--line-soft:#E9EDED;
  --analjezik:#0F766E;--analjezik-bg:#E4F1EE;
  --antibiyotik:#1D5FA5;--antibiyotik-bg:#E4EDF7;
  --gastro:#B45309;--gastro-bg:#F6ECDD;
  --saf:#0F766E;--saf-bg:#E4F1EE;
  --combo:#5B4FC7;--combo-bg:#ECEAF9;
  --makrolid:#B45309;--makrolid-bg:#F6ECDD;
  --ppi:#7C3D8A;--ppi-bg:#F3EAF6;
  --warn:#8A4B0A;--warn-bg:#F6ECDD;
  --danger:#B02A2A;--danger-bg:#F7E7E5;
  --shadow:0 1px 2px rgba(24,37,40,.05),0 4px 16px rgba(24,37,40,.05);
  --r:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --paper:#12191A;--card:#1A2325;--ink:#E7ECEC;--muted:#9AA8AB;--faint:#6E7C7F;
    --line:#2A3739;--line-soft:#222D2F;
    --analjezik:#3FBFAE;--analjezik-bg:#17302D;
    --antibiyotik:#5FA0E6;--antibiyotik-bg:#152838;
    --gastro:#E0913A;--gastro-bg:#33260F;
    --saf:#3FBFAE;--saf-bg:#17302D;
    --combo:#9C8FF0;--combo-bg:#241F3A;
    --makrolid:#E0913A;--makrolid-bg:#33260F;
    --ppi:#C084D8;--ppi-bg:#2E1A33;
    --warn:#E0A24A;--warn-bg:#33260F;
    --danger:#E67C74;--danger-bg:#331A18;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.3);
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{max-width:760px;margin:0 auto;padding:22px 16px 80px}
header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.brand h1{font-family:"Fraunces",serif;font-weight:500;font-size:27px;line-height:1.1;margin:0;letter-spacing:-.01em}
.brand p{margin:4px 0 0;color:var(--muted);font-size:13.5px}
.add-btn{font-family:inherit;font-size:14px;font-weight:500;color:#fff;background:var(--ink);border:none;border-radius:999px;padding:10px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .12s,opacity .12s}
.add-btn:hover{opacity:.9}.add-btn:active{transform:scale(.97)}
.add-btn svg{width:15px;height:15px}
.vswitch{display:inline-flex;background:var(--line-soft);border-radius:999px;padding:4px;gap:2px;margin-bottom:6px}
.seg{font-family:inherit;font-size:13.5px;font-weight:450;color:var(--muted);background:transparent;border:none;border-radius:999px;padding:8px 18px;cursor:pointer;transition:.14s}
.seg.on{color:var(--ink);background:var(--card);font-weight:500;box-shadow:var(--shadow)}
.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0 14px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.tab{font-family:inherit;font-size:13.5px;font-weight:450;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:7px 15px;cursor:pointer;transition:.14s;display:inline-flex;align-items:center;gap:7px}
.tab:hover{border-color:var(--faint)}
.tab.on{color:var(--ink);background:var(--card);border-color:var(--ink);font-weight:500}
.tab .n{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
.tab.on .n{color:var(--muted)}
.search{position:relative;min-width:170px}
.search input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 14px 9px 34px;outline:none;transition:.14s}
.search input:focus{border-color:var(--analjezik)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--faint)}
.list{display:flex;flex-direction:column;gap:11px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);position:relative}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--spine)}
.card.flash{animation:flash 1.4s ease}
@keyframes flash{0%,100%{box-shadow:var(--shadow)}25%{box-shadow:0 0 0 3px var(--spine)}}
.chead{display:flex;align-items:center;gap:13px;width:100%;text-align:left;font-family:inherit;background:transparent;border:none;cursor:pointer;padding:15px 16px 15px 20px;color:inherit}
.chead:hover{background:var(--line-soft)}
.cname{flex:1;min-width:0}
.cname .nm{font-family:"Fraunces",serif;font-weight:500;font-size:19px;line-height:1.15;margin:0}
.cname .ea{font-size:13px;color:var(--muted);margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{flex:none;font-size:11.5px;font-weight:500;padding:3px 10px;border-radius:999px;letter-spacing:.02em}
.chev{flex:none;width:18px;height:18px;color:var(--faint);transition:transform .22s}
.card.open .chev{transform:rotate(180deg)}
.cbody{padding:2px 20px 18px;display:none}
.card.open .cbody{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1}}
.field{padding:11px 0;border-top:1px solid var(--line-soft)}
.field:first-child{border-top:none}
.field .lb{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.field .vl{font-size:14.5px;color:var(--ink);white-space:pre-wrap}
.field.kontra .lb{color:var(--danger)}.field.kontra .vl{color:var(--danger)}
.cact{display:flex;gap:8px;margin-top:14px}
.mini{font-family:inherit;font-size:13px;font-weight:450;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:9px;padding:7px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.14s}
.mini:hover{border-color:var(--faint);color:var(--ink)}
.mini.del:hover{border-color:var(--danger);color:var(--danger)}
.mini svg{width:14px;height:14px}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .big{font-family:"Fraunces",serif;font-size:20px;color:var(--ink);margin-bottom:6px}
.empty button{margin-top:14px}
footer{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:16px;border-top:1px solid var(--line);font-size:12.5px;color:var(--faint);flex-wrap:wrap;gap:8px}
.link{background:none;border:none;font-family:inherit;font-size:12.5px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0}
.link:hover{color:var(--ink)}
.overlay{position:fixed;inset:0;background:rgba(24,37,40,.42);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;z-index:50;backdrop-filter:blur(2px)}
.overlay.on{display:flex}
.modal{background:var(--card);border-radius:18px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.3);margin:auto}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 12px}
.mhead h2{font-family:"Fraunces",serif;font-weight:500;font-size:21px;margin:0}
.x{background:none;border:none;cursor:pointer;color:var(--faint);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.x:hover{background:var(--line-soft);color:var(--ink)}.x svg{width:18px;height:18px}
.mbody{padding:4px 22px 8px;max-height:62vh;overflow-y:auto}
.frow{margin-bottom:13px}
.frow label{display:block;font-size:12.5px;font-weight:500;color:var(--muted);margin-bottom:5px}
.frow input,.frow select,.frow textarea{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:9px 12px;outline:none;transition:.14s;resize:vertical}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--analjezik);background:var(--card)}
.frow textarea{min-height:56px;line-height:1.5}
.mfoot{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px 20px}
.btn-ghost{font-family:inherit;font-size:14px;font-weight:450;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:10px;padding:10px 18px;cursor:pointer}
.btn-ghost:hover{border-color:var(--faint);color:var(--ink)}
.btn-solid{font-family:inherit;font-size:14px;font-weight:500;color:#fff;background:var(--ink);border:none;border-radius:10px;padding:10px 20px;cursor:pointer}
.btn-solid:hover{opacity:.9}
/* Tree */
.tree-intro{color:var(--muted);font-size:13.5px;margin:2px 0 16px}
.crumbs{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:0 0 14px;min-height:26px}
.crumb{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--line-soft);color:var(--muted)}
.crumb-r{background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;color:var(--muted);padding:3px 6px}
.crumb-r:hover{color:var(--ink)}.sep{color:var(--faint)}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;box-shadow:var(--shadow)}
.qh{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:0 0 6px}
.qt{font-family:"Fraunces",serif;font-size:20px;font-weight:500;margin:0 0 14px;line-height:1.25}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{width:100%;text-align:left;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.14s}
.opt:hover{border-color:var(--analjezik);background:var(--card)}
.opt svg{width:17px;height:17px;color:var(--faint);flex:none;margin-left:auto}
.leaf{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
.leaf-top{padding:16px 18px 14px;border-left:4px solid var(--fam)}
.leaf-name{font-family:"Fraunces",serif;font-size:23px;font-weight:500;margin:0;line-height:1.1}
.leaf-etken{font-size:13.5px;color:var(--muted);margin:3px 0 0}
.fam-chip{display:inline-block;font-size:12px;font-weight:500;padding:3px 11px;border-radius:999px;margin-top:9px;background:var(--fam-bg);color:var(--fam)}
.sec{padding:13px 18px;border-top:1px solid var(--line-soft)}
.sec .lb{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin:0 0 4px;display:flex;align-items:center;gap:6px}
.sec .lb svg{width:14px;height:14px;color:var(--fam)}
.sec .tx{font-size:14.5px;line-height:1.55;margin:0}
.hasta{display:flex;gap:11px;align-items:flex-start}
.hasta .av{width:34px;height:34px;flex:none;border-radius:50%;background:var(--fam-bg);color:var(--fam);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.redflag{padding:12px 18px;background:var(--warn-bg);color:var(--warn);font-size:13px;line-height:1.5;display:flex;gap:8px}
.redflag svg{width:15px;height:15px;flex:none;margin-top:2px}
.leaf-act{display:flex;gap:9px;padding:14px 18px;border-top:1px solid var(--line-soft);flex-wrap:wrap}
.act{font-family:inherit;font-size:13px;font-weight:450;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--ink);display:inline-flex;align-items:center;gap:6px;transition:.14s}
.act:hover{border-color:var(--faint)}
.act.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
.act svg{width:15px;height:15px}
/* Terimler */
.tcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);position:relative}
.tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--tspine,var(--analjezik))}
.thead-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;font-family:inherit;background:transparent;border:none;cursor:pointer;padding:13px 15px 13px 18px;color:inherit}
.thead-btn:hover{background:var(--line-soft)}
.tword{flex:1;min-width:0}
.tword .tw{font-family:"Fraunces",serif;font-weight:500;font-size:17px;margin:0;line-height:1.2}
.tword .tcat{font-size:12px;color:var(--muted);margin:2px 0 0}
.tchev{flex:none;width:17px;height:17px;color:var(--faint);transition:transform .2s}
.tcard.open .tchev{transform:rotate(180deg)}
.tbody{padding:3px 18px 14px;display:none;font-size:14.5px;line-height:1.6}
.tcard.open .tbody{display:block;animation:fade .2s ease}
.tbody .tanim{white-space:pre-wrap;margin:6px 0 10px}
.tbody .ornekler{font-size:13px;color:var(--muted);border-top:1px solid var(--line-soft);padding-top:8px;margin-top:4px}
.tbody .ornekler span{font-weight:500;color:var(--faint)}
.tact{display:flex;gap:7px;margin-top:10px}
[hidden]{display:none!important}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:520px){.brand h1{font-size:23px}.cname .nm{font-size:17px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>İlaç Kartlığım</h1>
      <p>Analjezik · Antibiyotik · Gastro · kartlar ve karar ağacı</p>
    </div>
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Yeni ilaç
    </button>
  </header>

  <div class="vswitch" role="tablist">
    <button class="seg on" data-view="cards" role="tab">Kartlar</button>
    <button class="seg" data-view="tree" role="tab">Karar ağacı</button>
    <button class="seg" data-view="terimler" role="tab">Terimler</button>
  </div>

  <div id="view-cards">
    <div class="tools">
      <div class="tabs" id="tabs"></div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
        <input id="search" type="text" placeholder="Ara: ad veya etken madde" autocomplete="off">
      </div>
    </div>
    <div class="list" id="list"></div>
    <footer>
      <span id="stat">Yükleniyor…</span>
      <button class="link" id="resetBtn">Örnek verilere sıfırla</button>
    </footer>
  </div>

  <div id="view-tree" hidden>
    <p class="tree-intro">Önce grubu seç, sonra her adımda bir kilit soruyu yanıtla, dalın ucundaki ilaca in.</p>
    <div class="crumbs" id="crumbs"></div>
    <div id="stage"></div>
  </div>

  <div id="view-terimler" hidden>
    <div class="tools">
      <div class="tabs" id="term-tabs"></div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
        <input id="term-search" type="text" placeholder="Terim ara…" autocomplete="off">
      </div>
    </div>
    <div class="list" id="term-list"></div>
    <footer>
      <span id="term-stat"></span>
      <button class="add-btn" id="termAddBtn" style="font-size:13px;padding:8px 15px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Yeni terim
      </button>
    </footer>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mtitle">
    <div class="mhead">
      <h2 id="mtitle">Yeni ilaç</h2>
      <button class="x" id="closeBtn" aria-label="Kapat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot">
      <button class="btn-ghost" id="cancelBtn">Vazgeç</button>
      <button class="btn-solid" id="saveBtn">Kaydet</button>
    </div>
  </div>
</div>

<script>
const CATS={
  analjezik:{label:"Analjezik",color:"var(--analjezik)",bg:"var(--analjezik-bg)"},
  antibiyotik:{label:"Antibiyotik",color:"var(--antibiyotik)",bg:"var(--antibiyotik-bg)"},
  gastro:{label:"Gastro",color:"var(--gastro)",bg:"var(--gastro-bg)"}
};
const FIELDS=[
  {k:"ad",label:"İlaç adı",t:"input",req:true},
  {k:"etken",label:"Etken madde",t:"input"},
  {k:"kategori",label:"Kategori",t:"select"},
  {k:"ozellik",label:"Özellik",t:"area"},
  {k:"mekanizma",label:"Etki mekanizması",t:"area"},
  {k:"etki",label:"Etki",t:"area"},
  {k:"endikasyon",label:"Endikasyonlar",t:"area"},
  {k:"neicin",label:"Ne için kullanılır",t:"area"},
  {k:"fayda",label:"Fayda",t:"area"},
  {k:"kontrendikasyon",label:"Kontrendikasyonlar",t:"area"},
  {k:"etkilesim",label:"İlaç etkileşimleri",t:"area"},
  {k:"formlar",label:"Formlar",t:"input"},
  {k:"ayirt",label:"Ayırt edici özellik",t:"area"}
];
const DISPLAY=["ozellik","mekanizma","etki","endikasyon","neicin","fayda","kontrendikasyon","etkilesim","formlar","ayirt"];
const LABELS=Object.fromEntries(FIELDS.map(f=>[f.k,f.label]));

const ANALJ=[
  {id:"etol",ad:"Etol",etken:"Etodolak",kategori:"analjezik",ozellik:"NSAİİ (non-steroid antiinflamatuar)",mekanizma:"Prostaglandin üretimini sağlayan siklooksijenaz (COX) enzimlerini inhibe eder.",etki:"Antiinflamatuar, analjezik ve antipiretik etki gösterir.",endikasyon:"Osteoartrit, romatoid artrit, ankilozan spondilit, akut gut artriti, kas-iskelet ağrıları, ameliyat sonrası ağrı/inflamasyon, dismenore.",neicin:"",fayda:"",kontrendikasyon:"NSAİİ'ye bağlı GİS kanama öyküsü, ciddi karaciğer/böbrek/kalp yetmezliği, geç gebelik, aktif peptik ülser, 18 yaş altı.",etkilesim:"Antikoagülanlar, diğer NSAİİ'ler, lityum.",formlar:"200 / 400 / 600 (SR) / 800 mg tablet",ayirt:"Kronik hastalarda. Uzun etkili (SR/dual salımlı) formları var."},

const SEED_ALL=[...ANALJ,...ANTIB,...GASTRO];

const KEY="ilac_kartligi_v3";
async function migrate(){
  if(!store)return SEED_ALL.slice();
  try{
    const r=await store.get(KEY);
    const p=JSON.parse(r.value);
    let base=Array.isArray(p)?p:(p.drugs||[]);
    GASTRO.forEach(d=>{if(!base.find(x=>x.id===d.id))base.push(d);});
    return base;
  }catch(e){
    try{
      const old=await store.get("ilac_kartligi_v2");
      const p=JSON.parse(old.value);
      let base=Array.isArray(p)?p:(p.drugs||[]);
      GASTRO.forEach(d=>{if(!base.find(x=>x.id===d.id))base.push(d);});
      return base;
    }catch(e2){return SEED_ALL.slice();}
  }
}

  const c=counts();

    `<button class="tab ${k===activeCat?"on":""}" data-cat="${k}">${lb}<span class="n">${c[k]||0}</span></button>`

}

    list.innerHTML=`<div class="empty"><div class="big">${query?"Sonuç yok":(emptyCat?emptyCat+" kartın yok":"Kart yok")}</div>
      <div>${query?"Başka bir ad ya da etken madde dene.":"İlk kartını eklemek için başla."}</div>
      ${query?"":'<button class="add-btn" data-add="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Yeni ilaç</button>'}</div>`;
  }else{
    items.sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
    list.innerHTML=items.map(d=>{
      const cat=CATS[d.kategori]||CATS.analjezik;
      const open=expanded.has(d.id);
      const rows=DISPLAY.filter(k=>d[k]&&d[k].trim()).map(k=>
        `<div class="field ${k==="kontrendikasyon"?"kontra":""}"><div class="lb">${LABELS[k]}</div><div class="vl">${esc(d[k])}</div></div>`
      ).join("");
      return `<div class="card ${open?"open":""}" style="--spine:${cat.color}" data-id="${d.id}">
        <button class="chead" aria-expanded="${open}">
          <div class="cname"><p class="nm">${esc(d.ad)}</p><p class="ea">${esc(d.etken)||"&nbsp;"}</p></div>
          <span class="chip" style="color:${cat.color};background:${cat.bg}">${cat.label}</span>
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="cbody">${rows||'<div class="field"><div class="vl" style="color:var(--muted)">Henüz detay girilmemiş.</div></div>'}
          <div class="cact">
            <button class="mini edit" data-edit="${d.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Düzenle</button>
            <button class="mini del" data-del="${d.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>Sil</button>
          </div>
        </div>
      </div>`;
    }).join("");
  }
  const c=counts();
  document.getElementById("stat").textContent=`${drugs.length} kart · ${c.analjezik} analjezik · ${c.antibiyotik} antibiyotik · ${c.gastro} gastro`;
}
function openModal(id){
  editingId=id||null;
  const d=id?drugs.find(x=>x.id===id):{kategori:activeCat!=="all"?activeCat:"analjezik"};
  document.getElementById("mtitle").textContent=id?"İlacı düzenle":"Yeni ilaç";
  document.getElementById("mbody").innerHTML=FIELDS.map(f=>{
    const v=esc(d[f.k]||"");
    let ctrl;
    if(f.t==="select"){ctrl=`<select id="f_${f.k}">`+Object.keys(CATS).map(k=>`<option value="${k}" ${d[f.k]===k?"selected":""}>${CATS[k].label}</option>`).join("")+`</select>`;}
    else if(f.t==="area"){ctrl=`<textarea id="f_${f.k}">${v}</textarea>`;}
    else{ctrl=`<input id="f_${f.k}" type="text" value="${v}" ${f.req?"required":""}>`;}
    return `<div class="frow"><label for="f_${f.k}">${f.label}${f.req?' <span style="color:var(--danger)">*</span>':""}</label>${ctrl}</div>`;
  }).join("");
  document.getElementById("overlay").classList.add("on");
  setTimeout(()=>{const el=document.getElementById("f_ad");if(el)el.focus();},50);
}
function closeModal(){document.getElementById("overlay").classList.remove("on");editingId=null;}
async function saveModal(){
  const ad=document.getElementById("f_ad").value.trim();
  if(!ad){document.getElementById("f_ad").focus();document.getElementById("f_ad").style.borderColor="var(--danger)";return;}
  const obj={};FIELDS.forEach(f=>obj[f.k]=document.getElementById("f_"+f.k).value.trim());
  if(editingId){const i=drugs.findIndex(x=>x.id===editingId);obj.id=editingId;drugs[i]=obj;}
  else{obj.id=uid();drugs.push(obj);expanded.add(obj.id);}
  await save();closeModal();render();
}
document.getElementById("addBtn").onclick=()=>openModal();
document.getElementById("closeBtn").onclick=closeModal;
document.getElementById("cancelBtn").onclick=closeModal;
document.getElementById("saveBtn").onclick=saveModal;
document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&document.getElementById("overlay").classList.contains("on"))closeModal();});
document.getElementById("tabs").onclick=e=>{const t=e.target.closest(".tab");if(t){activeCat=t.dataset.cat;render();}};
document.getElementById("search").oninput=e=>{query=e.target.value;render();};
document.getElementById("list").onclick=e=>{
  if(e.target.closest("[data-add]")){openModal();return;}
  const ed=e.target.closest("[data-edit]");if(ed){openModal(ed.dataset.edit);return;}
  const dl=e.target.closest("[data-del]");if(dl){
    const d=drugs.find(x=>x.id===dl.dataset.del);
    if(confirm(`"${d?d.ad:"Bu kart"}" silinsin mi?`)){drugs=drugs.filter(x=>x.id!==dl.dataset.del);expanded.delete(dl.dataset.del);save();render();}
    return;
  }
  const h=e.target.closest(".chead");if(h){const id=h.closest(".card").dataset.id;if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
};
document.getElementById("resetBtn").onclick=async()=>{
  if(confirm("Tüm kartlar örnek verilerle değiştirilecek. Emin misin?")){drugs=SEED_ALL.slice();expanded.clear();await save();render();}
};
function switchView(v){
  document.querySelectorAll(".seg").forEach(s=>s.classList.toggle("on",s.dataset.view===v));
  document.getElementById("view-cards").hidden=(v!=="cards");
  document.getElementById("view-tree").hidden=(v!=="tree");
  document.getElementById("addBtn").style.visibility=(v==="cards")?"visible":"hidden";
  if(v==="tree")treeReset();
}
document.querySelectorAll(".seg").forEach(s=>s.onclick=()=>switchView(s.dataset.view));

function treePick(id,i){const o=TREE[id].a[i];tpath.push(o.t);if(TREE[o.to])treeNode(o.to);else treeLeaf(o.to);}

function goToCard(id){

  {id:"t_gorh",terim:"GÖRH",kategori:"kisaltma",tanim:"Gastroözofajiyal Reflü Hastalığı. Midenin asit içeriğinin yemek borusuna kaçması sonucu oluşan hastalık. Göğüste yanma, ekşime ve ağza acı su gelmesi en sık belirtileridir. Uzun süreli reflü yemek borusunda iltihaplanmaya (özofajit) yol açabilir.",ornekler:"Esom, Lansoprol, Pulcet"},
  {id:"t_ze",terim:"Zollinger-Ellison Sendromu",kategori:"hastalik",tanim:"Pankreas veya onikiparmak bağırsağında gastrin hormonu salgılayan tümörün (gastrinoma) bulunduğu nadir bir hastalık. Bu tümör aşırı miktarda gastrin üretir; gastrin ise mide asit salgısını çok yüksek seviyelere çıkarır. Sonuç olarak çok sayıda ve tedaviye dirençli ülserler oluşur.",ornekler:"Esom, Lansoprol, Pulcet"},
  {id:"t_klopidogrel",terim:"Klopidogrel",kategori:"ilac",tanim:"Trombosit (kan pıhtısı oluşturan hücre) topaklaşmasını önleyen bir antiplatelet ilaç. Kalp krizi veya inme geçirmiş ya da stent takılmış hastalarda pıhtı oluşumunu engellemek için kullanılır. Bazı PPI'larla (özellikle esomeprazol/omeprazol) birlikte kullanıldığında etkisi azalabilir; bu nedenle bu kombinasyonda Pulcet (pantoprazol) tercih edilir.",ornekler:"Pulcet, Esom"},
  {id:"t_cox",terim:"COX (Siklooksijenaz)",kategori:"mekanizma",tanim:"Siklooksijenaz; vücutta prostaglandin (ağrı, iltihap ve ateş aracısı) üretimini sağlayan enzim ailesi. COX-1 ve COX-2 olmak üzere iki ana tipi vardır. NSAİİ'ler bu enzimi inhibe ederek ağrı ve iltihabı azaltır. COX-1 mide mukozasını koruyucu prostaglandinleri de ürettiğinden, COX-1'i de baskılayan NSAİİ'ler mideye zarar verebilir.",ornekler:"Etol, Melox, Maprofen, Etolax, Tiyokas"},
  {id:"t_cox2",terim:"COX-2 Tercihli",kategori:"mekanizma",tanim:"Esas olarak COX-2 enzimini hedef alan, COX-1'i görece daha az baskılayan NSAİİ özelliği. COX-2 özellikle iltihap bölgelerinde artar; COX-1 ise mide korumasında kritiktir. COX-2 tercihli ilaçlar benzer ağrı kesici etki gösterirken mide yan etki riskini azaltır.",ornekler:"Melox (meloksikam)"},
  {id:"t_ppi",terim:"PPI (Proton Pompası İnhibitörü)",kategori:"ilac",tanim:"Mide pariyetal hücrelerindeki H+/K+-ATPaz enzimini (proton pompası) bloke ederek asit üretimini kaynağında durduran ilaç grubu. Antiasitlerden farklı olarak mevcut asidi nötralize etmez; yeni asit üretimini önler. Düzenli kullanımda etkisi artar. Esom, Lansoprol ve Pulcet bu gruba aittir.",ornekler:"Esom, Lansoprol, Pulcet"},
  {id:"t_nsaii",terim:"NSAİİ",kategori:"kisaltma",tanim:"Non-Steroidal Anti-İnflamatuar İlaç. Kortizol gibi steroid hormonlardan kimyasal olarak farklı olan ağrı kesici ve iltihap giderici ilaç grubu. COX enzimlerini inhibe ederek prostaglandin üretimini azaltırlar. Ağrı, iltihap ve ateşe karşı etkilidir. Mide, böbrek ve kalp-damar sistemi üzerinde yan etkileri olabilir.",ornekler:"Etol, Melox, Maprofen, Etolax, Tiyokas"},
  {id:"t_hp",terim:"Helicobacter pylori (H. pylori)",kategori:"hastalik",tanim:"Mide mukozasında yaşayan ve mide ile onikiparmak bağırsağı ülserlerinin en sık nedeni olan bir bakteri. Mide asidine dayanıklı özel bir yapısı vardır. Ülser tedavisinde tek başına yok edilemez; uygun antibiyotik kombinasyonları (genellikle iki antibiyotik) ile birlikte PPI kullanılarak eradike edilir.",ornekler:"Esom, Lansoprol, Pulcet, Aksef, Azaks"},
  {id:"t_erozif_ozofajit",terim:"Eroziv Özofajit",kategori:"hastalik",tanim:"Mide asidinin yemek borusuna sürekli kaçması sonucu yemek borusu iç yüzeyinde oluşan erozyon (yüzeysel hasar) ve iltihaplanma. GÖRH'ün daha ileri evresi olarak kabul edilir. Göğüste yanma, yutma güçlüğü ve ağrıya yol açabilir.",ornekler:"Esom, Lansoprol, Pulcet"},
  {id:"t_sefalosporin",terim:"Sefalosporin",kategori:"ilac",tanim:"Beta-laktam halkası içeren geniş spektrumlu antibiyotik grubu. Bakterilerin hücre duvarı sentezini bozarak öldürürler (bakterisidal). 1. kuşaktan 5. kuşağa kadar sınıflandırılır; kuşak ilerledikçe gram-negatif bakteri kapsamı genişler. Penisilin alerjisi olanlarda çapraz reaksiyon riski göz önüne alınmalıdır.",ornekler:"Aksef (2. kuşak), Sefabel (3. kuşak-enjeksiyonluk), Sefpotec (3. kuşak-oral)"},
  {id:"t_makrolid",terim:"Makrolid",kategori:"ilac",tanim:"Bakterilerin 50S ribozomal alt birimine bağlanarak protein sentezini durduran antibiyotik grubu. Genellikle bakteriyostatiktir (bakteri büyümesini durdurur, öldürmez); yüksek konsantrasyonda bakterisidal etki gösterebilir. Atipik bakterilere karşı etkili olmaları ve dokularda uzun süre kalmaları önemli özellikleridir.",ornekler:"Azaks (azitromisin)"},
  {id:"t_bakterisidal",terim:"Bakterisidal",kategori:"mekanizma",tanim:"Bakterileri doğrudan öldüren etki türü. Beta-laktam antibiyotikler (sefalosporinler, penisilinler) ve bazı diğer antibiyotikler bu şekilde çalışır. Makrolid grubu ise çoğunlukla bakteriyostatiktir.",ornekler:"Aksef, Sefabel, Sefpotec"},
  {id:"t_bakteriyostatik",terim:"Bakteriyostatik",kategori:"mekanizma",tanim:"Bakterileri öldürmek yerine çoğalmalarını durduran etki türü. Bağışıklık sistemi devreye girerek bakterileri temizler. Makrolidler genellikle bu şekilde çalışır.",ornekler:"Azaks (azitromisin)"},
  {id:"t_atipik_bakteri",terim:"Atipik Bakteri",kategori:"hastalik",tanim:"Klasik boyama yöntemleriyle (Gram boyama) sınıflandırılamayan ve hücre duvarı yapısı farklı olan bakteri grubu. Mycoplasma pneumoniae, Chlamydia trachomatis, Legionella pneumophila bunların başında gelir. Hücre içinde yaşamaları nedeniyle hücre duvarını hedef alan beta-laktam antibiyotiklere yanıt vermezler; makrolidler, florokinolonlar ve tetrasiklinlerle tedavi edilirler.",ornekler:"Azaks (azitromisin)"},
  {id:"t_kabg",terim:"KABG (Koroner Arter Baypas Greft)",kategori:"kisaltma",tanim:"Tıkalı koroner arterlerin etrafından yeni bir kan yolu oluşturmak amacıyla yapılan açık kalp ameliyatı. Bu ameliyat öncesi ve sonrası dönemde NSAİİ kullanımı kardiyovasküler risk artışı nedeniyle kontrendikedir; bu nedenle tüm NSAİİ'lerin kontrendikasyon listesinde yer alır.",ornekler:"Etol, Melox, Maprofen, Etolax, Tiyokas"},
  {id:"t_ankilozan_spondilit",terim:"Ankilozan Spondilit",kategori:"hastalik",tanim:"Ağırlıklı olarak omurgayı ve sakroiliak eklemleri etkileyen kronik iltihabi romatizmal hastalık. Zamanla omurga eklemlerinde sertleşme ve kaynaşmaya (ankiloz) yol açabilir. Sabah tutukluğu ve bel ağrısı en belirgin belirtilerdir. NSAİİ'ler bu hastalığın temel tedavi seçeneklerinden biridir.",ornekler:"Etol, Melox, Maprofen, Etolax, Tiyokas"},
  {id:"t_dismenore",terim:"Dismenore",kategori:"hastalik",tanim:"Adet dönemiyle ilişkili kasılma tarzında pelvik ağrı. Prostaglandinlerin rahim kasını kasmasıyla oluşur. NSAİİ'ler prostaglandin üretimini baskılayarak bu ağrıyı etkin biçimde azaltır.",ornekler:"Etol, Melox, Tiyokas"},
  {id:"t_tiyokolsikosid",terim:"Tiyokolşikosid",kategori:"ilac",tanim:"Santral etkili kas gevşetici ajan. Spinal düzeyde GABA-A reseptörlerine bağlanarak kas tonusunu düşürür ve spazmı giderir. Tek başına ağrı kesmez; NSAİİ'lerle kombinasyonda hem ağrıya hem spazmına etki eder. Epilepsi ve nöbet öyküsünde kontrendikedir.",ornekler:"Etolax, Tiyokas"},
  {id:"t_gram_pos_neg",terim:"Gram Pozitif / Gram Negatif Bakteri",kategori:"mekanizma",tanim:"Bakterilerin hücre duvarı yapısına göre Gram boyama tekniğiyle ayrılması. Gram pozitif bakteriler kalın peptidoglikan tabakasıyla mor renk alır; gram negatifler ince tabaka ve dış zarla pembe kalır. Bu ayrım antibiyotik seçiminde kritik önem taşır; bazı antibiyotikler yalnızca birine etkilidir.",ornekler:"Aksef, Sefabel, Sefpotec, Azaks"},
  {id:"t_probenesid",terim:"Probenesid",kategori:"ilac",tanim:"Böbreklerin ürik asit atılımını artırarak gut hastalığını tedavi eden ilaç. Aynı zamanda bazı antibiyotiklerin (özellikle sefalosporinlerin) böbrekten atılımını yavaşlatarak kan düzeylerini yükseltebilir. Bu nedenle antibiyotik dozlarının dikkatli ayarlanması gerekebilir.",ornekler:"Aksef, Sefabel"}
];

const TERM_KEY="ilac_terimler_v1";
let terms=[], termCat="all", termQ="";
const termExpanded=new Set();
const termStore=store;

async function loadTerms(){
  if(!termStore){terms=TERM_SEED.slice();renderTerms();return;}
  try{const r=await termStore.get(TERM_KEY);terms=JSON.parse(r.value);}
  catch(e){terms=TERM_SEED.slice();await saveTerms();}
  renderTerms();
}
async function saveTerms(){if(termStore){try{await termStore.set(TERM_KEY,JSON.stringify(terms));}catch(e){console.error(e);}}}

function termCounts(){
  const c={all:terms.length};
  Object.keys(TERM_CATS).forEach(k=>c[k]=terms.filter(t=>t.kategori===k).length);
  return c;
}
function renderTermTabs(){
  const c=termCounts();
  const tabs=[["all","Tümü"]].concat(Object.keys(TERM_CATS).map(k=>[k,TERM_CATS[k].label]));
  document.getElementById("term-tabs").innerHTML=tabs.map(([k,lb])=>
    `<button class="tab ${k===termCat?"on":""}" data-tcat="${k}">${lb}<span class="n">${c[k]||0}</span></button>`
  ).join("");
}
function renderTerms(){
  renderTermTabs();
  let items=terms.filter(t=>termCat==="all"||t.kategori===termCat);
  if(termQ){const q=termQ.toLowerCase();items=items.filter(t=>(t.terim||"").toLowerCase().includes(q)||(t.tanim||"").toLowerCase().includes(q));}
  items.sort((a,b)=>(a.terim||"").localeCompare(b.terim||"","tr"));
  const list=document.getElementById("term-list");
  if(!items.length){
    list.innerHTML=`<div class="empty"><div class="big">${termQ?"Sonuç yok":"Terim yok"}</div>
      <div>${termQ?"Farklı bir kelime dene.":"İlk terimi ekle."}</div></div>`;
  }else{
    list.innerHTML=items.map(t=>{
      const cat=TERM_CATS[t.kategori]||TERM_CATS.diger;
      const open=termExpanded.has(t.id);
      return `<div class="tcard ${open?"open":""}" style="--tspine:${cat.color}" data-tid="${t.id}">
        <button class="thead-btn" aria-expanded="${open}">
          <div class="tword"><p class="tw">${esc(t.terim)}</p><p class="tcat">${cat.label}</p></div>
          <svg class="tchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="tbody">
          <div class="tanim">${esc(t.tanim)}</div>
          ${t.ornekler?`<div class="ornekler"><span>İlgili ilaçlar: </span>${esc(t.ornekler)}</div>`:""}
          <div class="tact">
            <button class="mini" data-tedit="${t.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Düzenle</button>
            <button class="mini del" data-tdel="${t.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>Sil</button>
          </div>
        </div>
      </div>`;
    }).join("");
  }
  document.getElementById("term-stat").textContent=`${terms.length} terim`;
}

let termEditingId=null;
function openTermModal(id){
  termEditingId=id||null;
  const t=id?terms.find(x=>x.id===id):{kategori:termCat!=="all"?termCat:"diger"};
  document.getElementById("mtitle").textContent=id?"Terimi düzenle":"Yeni terim";
  document.getElementById("mbody").innerHTML=`
    <div class="frow"><label for="ft_terim">Terim / Kısaltma <span style="color:var(--danger)">*</span></label>
      <input id="ft_terim" type="text" value="${esc(t.terim||"")}"></div>
    <div class="frow"><label for="ft_kategori">Kategori</label>
      <select id="ft_kategori">${Object.keys(TERM_CATS).map(k=>`<option value="${k}" ${t.kategori===k?"selected":""}>${TERM_CATS[k].label}</option>`).join("")}</select></div>
    <div class="frow"><label for="ft_tanim">Tanım</label>
      <textarea id="ft_tanim">${esc(t.tanim||"")}</textarea></div>
    <div class="frow"><label for="ft_ornekler">İlgili ilaçlar (isteğe bağlı)</label>
      <input id="ft_ornekler" type="text" value="${esc(t.ornekler||"")}"></div>`;
  document.getElementById("overlay").classList.add("on");
  document.getElementById("saveBtn").onclick=saveTermModal;
  setTimeout(()=>{const el=document.getElementById("ft_terim");if(el)el.focus();},50);
}
async function saveTermModal(){
  const terim=document.getElementById("ft_terim").value.trim();
  if(!terim){document.getElementById("ft_terim").style.borderColor="var(--danger)";return;}
  const obj={
    terim,
    kategori:document.getElementById("ft_kategori").value,
    tanim:document.getElementById("ft_tanim").value.trim(),
    ornekler:document.getElementById("ft_ornekler").value.trim()
  };
  if(termEditingId){const i=terms.findIndex(x=>x.id===termEditingId);obj.id=termEditingId;terms[i]=obj;}
  else{obj.id="t_"+uid();terms.push(obj);termExpanded.add(obj.id);}
  await saveTerms();closeModal();renderTerms();
}

document.getElementById("term-tabs").onclick=e=>{const t=e.target.closest("[data-tcat]");if(t){termCat=t.dataset.tcat;renderTerms();}};
document.getElementById("term-search").oninput=e=>{termQ=e.target.value;renderTerms();};
document.getElementById("termAddBtn").onclick=()=>{
  document.getElementById("saveBtn").onclick=saveTermModal;
  openTermModal();
};
document.getElementById("term-list").onclick=e=>{
  const ed=e.target.closest("[data-tedit]");if(ed){openTermModal(ed.dataset.tedit);return;}
  const dl=e.target.closest("[data-tdel]");if(dl){
    const t=terms.find(x=>x.id===dl.dataset.tdel);
    if(confirm(`"${t?t.terim:"Bu terim"}" silinsin mi?`)){terms=terms.filter(x=>x.id!==dl.dataset.tdel);termExpanded.delete(dl.dataset.tdel);saveTerms();renderTerms();}
    return;
  }
  const h=e.target.closest(".thead-btn");if(h){const id=h.closest(".tcard").dataset.tid;if(termExpanded.has(id))termExpanded.delete(id);else termExpanded.add(id);renderTerms();}
};

/* ===== switchView güncelle ===== */
const _origSwitch=switchView;
window.switchView=function(v){
  document.querySelectorAll(".seg").forEach(s=>s.classList.toggle("on",s.dataset.view===v));
  document.getElementById("view-cards").hidden=(v!=="cards");
  document.getElementById("view-tree").hidden=(v!=="tree");
  document.getElementById("view-terimler").hidden=(v!=="terimler");
  document.getElementById("addBtn").style.visibility=(v==="cards")?"visible":"hidden";
  if(v==="tree")treeReset();
  if(v==="terimler")renderTerms();
};
document.querySelectorAll(".seg").forEach(s=>s.onclick=()=>window.switchView(s.dataset.view));

loadTerms();
</script>
</body>
</html>
